name: Build EDA Config

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Increment Version
        uses: ./.github/actions/update-version
        with:
          variable_name: MY_VERSION
          environment_name: config
          current_value: ${{ vars.MY_VERSION }}

      - name: Print version
        run: echo "$current_value"
