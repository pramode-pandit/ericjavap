name: Build EDA Config

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Increment Version
        uses: ./.github/actions/update-version
        with:
          variable_name: CONFIG_CURR_VERSION 
          environment_name: ${{ inputs.environment }}
          current_value: ${{ vars.CONFIG_CURR_VERSION  }}

      - name: Print version
        run: echo "$current_value"
