name: Main Workflow 

on:
  push:
    branches:
      - master
  workflow_dispatch: # This enables the manual trigger button
    inputs:
      environment :
        description: 'dev|stg|prod'
        required: true
        default: 'dev'

permissions:
  contents: write
  actions: write
      
jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }} 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List all environment variables
        run: env

      - name: List ${{ inputs.environment || 'dev' }}  variables
        run: |
          echo "CONFIG_CURR_VERSION: ${{ vars.CONFIG_CURR_VERSION }}"
          echo "CONFIG_PREV_VERSION: ${{ vars.CONFIG_PREV_VERSION }}"

  build-eda-caconfig:
    needs: prepare
    uses: ./.github/workflows/eda-caconfig.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
    secrets: inherit

  get-version:
    runs-on: ubuntu-latest
    needs: build-eda-caconfig
    outputs:
      version: ${{ needs.build-eda-caconfig.outputs.version }}

    steps:
      - run: |
          echo "Version: ${{ needs.build-eda-caconfig.outputs.version }}"

    
  deploy:
    if: ${{ (inputs.environment || 'dev') == 'dev' }}
    needs: build-eda-caconfig
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      config_version: ${{ needs.build-eda-caconfig.outputs.version }}
    secrets: inherit

  debug:
    needs: build-eda-caconfig
    runs-on: ubuntu-latest
    steps:
    - run: echo '${{ toJson(needs.build-eda-caconfig.outputs) }}'
