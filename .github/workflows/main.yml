name: Main Workflow 

on:
  push:
    branches:
      - master
  workflow_dispatch: # This enables the manual trigger button
    inputs:
      environmnet:
        description: 'dev|stg|prod'
        required: true
        default: 'dev'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

  build-eda-caconfig:
    needs: build
    uses: ./.github/workflows/eda-caconfig.yml
    with:
      environment: dev
