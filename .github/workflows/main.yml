name: Main Workflow 

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: config

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Increment and Update Variable
        env:
          # Use your PAT stored in Secrets for API access
          # GH_TOKEN: ${{ secrets.MY_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          # Access the existing variable value
          CURRENT_VAL: ${{ vars.MY_VERSION }}
        run: |
          # 1. Calculate the new value
          version=$CURRENT_VAL
          
          prefix=$(echo $version | cut -d'-' -f1)
          num=$(echo $version | cut -d'-' -f2)

          major=$(echo $num | cut -d'.' -f1)
          minor=$(echo $num | cut -d'.' -f2)
          patch=$(echo $num | cut -d'.' -f3)

          patch=$((patch + 1))

          new_version="${prefix}-${major}.${minor}.${patch}"

          NEW_VAL=$new_version
          echo "Incrementing MY_COUNTER: $CURRENT_VAL -> $NEW_VAL"

          # 2. Update the variable in the repository using GitHub CLI
          gh variable set MY_VERSION --body "$NEW_VAL" --env config.
