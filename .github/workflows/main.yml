name: Main Workflow 

on:
  push:
    branches:
      - master
  workflow_dispatch: # This enables the manual trigger button
    inputs:
      environmnet:
        description: 'dev|stg|prod'
        required: true
        default: 'dev'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List all environment variables
        run: env

      - name: List ${{ inputs.environmnet }}  variables
        run: |
          echo "CONFIG_CURR_VERSION: ${{ vars.CONFIG_CURR_VERSION }}"
          echo "CONFIG_PREV_VERSION: ${{ vars.CONFIG_PREV_VERSION }}"

  build-eda-caconfig:
    needs: build
    uses: ./.github/workflows/eda-caconfig.yml
    with:
      environment: dev
